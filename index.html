<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Too Hectic</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #2a8bcb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Impact, 'Arial Black', sans-serif;
    }

    .logo {
      width: 300px;
      max-width: 80vw;
      margin-bottom: 20px;
    }

    .characters {
      width: 500px;
      max-width: 90vw;
    }

    .tagline {
      font-size: 3rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 20px;
      color: #111111;
    }
  </style>
</head>
<body>
  <img class="logo" src="Assets/Too-Hectic_PatchLogo.png" alt="Too Hectic Logo">
  <img class="characters" src="Assets/BoysDance.png" alt="Chip and Rudy">
  <p class="tagline">Coming Soonish</p>

</html>
